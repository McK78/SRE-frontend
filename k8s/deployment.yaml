apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: default
  labels:
    app: frontend
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        version: v1
      annotations:
        # Dynatrace OneAgent annotations
        oneagent.dynatrace.com/inject: "true"
        oneagent.dynatrace.com/technologies: "nodejs"
    spec:
      containers:
        - name: frontend
          image: khasham1/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:8080"
            - name: INVENTORY_SERVICE_URL
              value: "http://inventory-service:8080"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:8080"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:8080"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always
